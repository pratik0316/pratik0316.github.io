<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Pratik Dey - Software Engineer working on distributed systems, cloud storage, backend infrastructure, and production reliability." />
  <title>Pratik Dey - Software Engineer</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    :root {
      --bg: #f8fafc;
      --surface: #ffffff;
      --surface-soft: #f1f5f9;
      --text: #202124;
      --muted: #5f6368;
      --border: #e5e7eb;
      --blue: #1a73e8;
      --blue-soft: #e8f0fe;
      --green: #188038;
      --yellow: #fbbc04;
      --red: #d93025;
      --shadow: 0 1px 2px rgba(60, 64, 67, 0.08), 0 4px 16px rgba(60, 64, 67, 0.06);
      --radius: 18px;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(66, 133, 244, 0.10), transparent 30rem),
        linear-gradient(180deg, #ffffff 0%, var(--bg) 38rem);
      line-height: 1.6;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .shell {
      width: min(1120px, calc(100% - 40px));
      margin: 0 auto;
    }

    .nav {
      position: sticky;
      top: 0;
      z-index: 10;
      border-bottom: 1px solid rgba(229, 231, 235, 0.82);
      background: rgba(255, 255, 255, 0.86);
      backdrop-filter: blur(16px);
    }

    .nav-inner {
      height: 68px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 22px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 700;
      letter-spacing: -0.01em;
    }

    .brand-mark {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      color: #ffffff;
      font-size: 13px;
      background: conic-gradient(from 150deg, var(--blue), var(--green), var(--yellow), var(--red), var(--blue));
      box-shadow: 0 1px 8px rgba(26, 115, 232, 0.22);
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      color: var(--muted);
      font-weight: 500;
    }

    .nav-links a {
      padding: 8px 12px;
      border-radius: 999px;
    }

    .nav-links a:hover {
      background: var(--blue-soft);
      color: var(--blue);
    }

    .resume-button {
      background: var(--blue) !important;
      color: #ffffff !important;
      box-shadow: 0 1px 5px rgba(26, 115, 232, 0.25);
    }

    .hero {
      padding: 72px 0 34px;
    }

    .hero-grid {
      display: grid;
      grid-template-columns: minmax(0, 1.45fr) minmax(300px, 0.75fr);
      gap: 28px;
      align-items: stretch;
    }

    .hero-main,
    .hero-side,
    .section-card {
      background: rgba(255, 255, 255, 0.92);
      border: 1px solid rgba(229, 231, 235, 0.9);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .hero-main {
      padding: 44px;
    }

    .eyebrow {
      width: fit-content;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--blue);
      background: var(--blue-soft);
      border-radius: 999px;
      padding: 7px 12px;
      font-size: 13px;
      font-weight: 700;
      margin-bottom: 24px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 0 4px rgba(24, 128, 56, 0.12);
    }

    h1 {
      margin: 0;
      font-size: clamp(42px, 7vw, 76px);
      line-height: 0.98;
      letter-spacing: -0.055em;
      color: #111827;
    }

    .hero-title-accent {
      color: var(--blue);
    }

    .hero-copy {
      max-width: 760px;
      margin: 22px 0 0;
      font-size: 18px;
      color: #3c4043;
    }

    .hero-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 28px;
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 42px;
      border-radius: 999px;
      padding: 0 18px;
      border: 1px solid var(--border);
      font-weight: 700;
      font-size: 14px;
      background: #ffffff;
      color: var(--text);
      transition: transform 150ms ease, box-shadow 150ms ease, border-color 150ms ease;
    }

    .button:hover {
      transform: translateY(-1px);
      box-shadow: var(--shadow);
      border-color: #cbd5e1;
    }

    .button.primary {
      background: var(--blue);
      color: #ffffff;
      border-color: var(--blue);
    }

    .hero-side {
      padding: 26px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      gap: 24px;
    }

    .profile-card-top {
      display: flex;
      gap: 14px;
      align-items: center;
    }

    .avatar {
      width: 58px;
      height: 58px;
      border-radius: 18px;
      display: grid;
      place-items: center;
      background: #ffffff;
      border: 1px solid var(--border);
      font-weight: 800;
      color: var(--blue);
      box-shadow: 0 1px 8px rgba(26, 115, 232, 0.10);
    }

    .profile-name {
      font-weight: 800;
      font-size: 19px;
      margin-bottom: 1px;
    }

    .profile-role {
      color: var(--muted);
      font-size: 14px;
    }

    .quick-links {
      display: grid;
      gap: 10px;
    }

    .quick-link {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      border-radius: 13px;
      border: 1px solid var(--border);
      background: #ffffff;
      padding: 12px 14px;
      color: #3c4043;
      font-weight: 600;
      font-size: 14px;
    }

    .quick-link span {
      color: var(--blue);
    }

    .metrics {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 14px;
      margin-top: 24px;
    }

    .metric {
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 18px;
      background: #ffffff;
      box-shadow: 0 1px 2px rgba(60, 64, 67, 0.05);
    }

    .metric-value {
      font-size: 23px;
      font-weight: 800;
      letter-spacing: -0.03em;
      color: var(--blue);
    }

    .metric-label {
      margin-top: 4px;
      font-size: 13px;
      color: var(--muted);
      line-height: 1.4;
    }

    .section {
      padding: 18px 0;
    }

    .section-heading {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 16px;
      margin: 0 0 16px;
    }

    .section-heading h2 {
      margin: 0;
      font-size: 26px;
      letter-spacing: -0.03em;
      color: #111827;
    }

    .section-heading p {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
    }

    .section-card {
      padding: 28px;
    }

    .experience-list {
      display: grid;
      gap: 18px;
    }

    .experience-item {
      display: grid;
      grid-template-columns: 220px minmax(0, 1fr);
      gap: 22px;
      padding: 22px;
      border-radius: 16px;
      border: 1px solid var(--border);
      background: #ffffff;
    }

    .company {
      font-weight: 800;
      font-size: 18px;
      color: #7c2d12;
    }

    .role {
      margin-top: 3px;
      font-size: 14px;
      color: var(--blue);
      font-weight: 700;
    }

    .date {
      margin-top: 8px;
      font-size: 13px;
      color: var(--muted);
    }

    .bullets {
      margin: 0;
      padding-left: 18px;
      color: #3c4043;
    }

    .bullets li {
      margin: 0 0 8px;
      padding-left: 4px;
    }

    .bullets li:last-child {
      margin-bottom: 0;
    }

    .bullets strong {
      color: #111827;
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .chip {
      border-radius: 999px;
      border: 1px solid #dbeafe;
      background: var(--blue-soft);
      color: var(--blue);
      padding: 8px 12px;
      font-weight: 700;
      font-size: 13px;
    }

    .chip.alt {
      border-color: #fde68a;
      background: #fffbeb;
      color: #92400e;
    }

    .two-col {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px;
    }

    .mini-card {
      padding: 22px;
      border: 1px solid var(--border);
      border-radius: 16px;
      background: #ffffff;
    }

    .mini-title {
      margin: 0 0 8px;
      font-size: 16px;
      font-weight: 800;
      color: #111827;
    }

    .mini-text {
      margin: 0;
      color: var(--muted);
    }

    .footer {
      padding: 38px 0 56px;
      color: var(--muted);
      font-size: 14px;
      text-align: center;
    }

    @media (max-width: 900px) {
      .hero-grid,
      .two-col {
        grid-template-columns: 1fr;
      }

      .metrics {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .experience-item {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 640px) {
      .shell {
        width: min(100% - 28px, 1120px);
      }

      .nav-inner {
        height: auto;
        min-height: 64px;
        padding: 10px 0;
      }

      .nav-links a:not(.resume-button) {
        display: none;
      }

      .hero {
        padding-top: 36px;
      }

      .hero-main,
      .hero-side,
      .section-card {
        padding: 22px;
        border-radius: 16px;
      }

      .hero-copy {
        font-size: 16px;
      }

      .metrics {
        grid-template-columns: 1fr;
      }

      .section-heading {
        align-items: start;
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const resumeHref = "./Pratik_Dey_Resume.pdf";

    const links = [
      { label: "Email", value: "pratikdey0316@gmail.com", href: "mailto:pratikdey0316@gmail.com" },
      { label: "GitHub", value: "github.com/pratik0316", href: "https://github.com/pratik0316" },
      { label: "LinkedIn", value: "linkedin.com/in/pratikdey0316", href: "https://linkedin.com/in/pratikdey0316" },
      { label: "LeetCode", value: "leetcode.com/u/pratikdey0316", href: "https://leetcode.com/u/pratikdey0316" },
    ];

    const metrics = [
      { value: "4+ yrs", label: "backend and distributed systems experience" },
      { value: "1000/min", label: "Azure Direct Drive DNS operation throughput" },
      { value: "6K/min", label: "DynamoDB CDC writes indexed to OpenSearch" },
      { value: "0", label: "RBAC 409 conflicts after lock-free redesign" },
    ];

    const experiences = [
      {
        company: "Microsoft",
        role: "Software Engineer - Azure Storage",
        date: "Sept 2024 - Present",
        bullets: [
          <>Scaled <strong>Azure Direct Drive</strong> provisioning from <strong>300/min to 1000/min</strong> through DNS architecture redesign.</>,
          <>Eliminated subscription-level contention in <strong>RBAC</strong> notification handling, reducing <strong>HTTP 409</strong> conflicts from <strong>150/hr to zero</strong>.</>,
          <>Mitigated a critical logging vulnerability exposing <strong>Azure Storage SAS keys</strong> through detection and service hardening.</>,
          <>Migrated <strong>4+ services</strong> from IFX to <strong>OpenTelemetry</strong>, improving telemetry scalability and reducing metric cardinality.</>,
          <>Built a <strong>GitHub Copilot skill</strong> to improve safety certification review documentation for externally exposed service APIs.</>,
        ],
      },
      {
        company: "Amazon",
        role: "Software Engineer",
        date: "July 2022 - Aug 2024",
        bullets: [
          <>Architected a real-time CDC pipeline (<strong>DynamoDB - Kinesis - Lambda - OpenSearch</strong>) supporting <strong>6K writes/min</strong>.</>,
          <>Eliminated <strong>60K+/hour</strong> false-positive Alexa voice command triggers through command-processing redesign.</>,
          <>Externalized <strong>Personal Knowledge Service</strong> to Alexa mobile clients, reworking AuthN/AuthZ and scaling backend capacity.</>,
        ],
      },
      {
        company: "CRED",
        role: "SWE Intern - SRE",
        date: "Oct 2021 - Mar 2022",
        bullets: [
          <>Built internal <strong>IAM</strong> access tooling for self-serve AWS role grants, reducing SRE on-call effort by <strong>50%</strong>.</>,
          <>Automated cross-account IAM user migrations with policy mapping, permission boundaries, and rollback flows.</>,
        ],
      },
      {
        company: "Google Summer of Code - AboutCode",
        role: "Open Source Contributor",
        date: "May 2021 - Aug 2021",
        bullets: [
          <>Enhanced the DeltaCode diff engine using the VirtualCodebase library and Azure CI quality checks.</>,
          <>Improved project onboarding with ReadTheDocs documentation and Docker containerization.</>,
        ],
      },
    ];

    const skillGroups = [
      {
        title: "Languages",
        skills: ["Python", "Kotlin", "Go", "C#", "Rust"],
      },
      {
        title: "Cloud and Infrastructure",
        skills: ["Azure", "AWS", "Kubernetes", "Docker", "ECS", "Lambda", "API Gateway"],
      },
      {
        title: "Distributed Systems and Data",
        skills: ["DynamoDB", "OpenSearch", "Kinesis", "Apache Spark", "Apache Arrow", "CDC Pipelines"],
      },
      {
        title: "Reliability and Observability",
        skills: ["OpenTelemetry", "Production Debugging", "Incident Response", "CI/CD", "Root Cause Analysis"],
      },
    ];

    function Nav() {
      return (
        <header className="nav">
          <div className="shell nav-inner">
            <a className="brand" href="#top" aria-label="Pratik Dey home">
              <span className="brand-mark">PD</span>
              <span>Pratik Dey</span>
            </a>
            <nav className="nav-links" aria-label="Primary navigation">
              <a href="#experience">Experience</a>
              <a href="#skills">Skills</a>
              <a href="#education">Education</a>
              <a className="resume-button" href={resumeHref} target="_blank" rel="noreferrer">Resume</a>
            </nav>
          </div>
        </header>
      );
    }

    function Hero() {
      return (
        <section className="hero shell" id="top">
          <div className="hero-grid">
            <div className="hero-main">
              <div className="eyebrow"><span className="status-dot"></span>Distributed systems engineer</div>
              <h1>Building reliable cloud infrastructure at scale<span className="hero-title-accent">.</span></h1>
              <p className="hero-copy">
                I work on Azure Storage control plane systems, backend infrastructure, and production reliability.
                My interests sit at the intersection of cloud storage, data infrastructure, distributed compute,
                and infrastructure for large-scale ML workloads.
              </p>
              <div className="hero-actions">
                <a className="button primary" href={resumeHref} target="_blank" rel="noreferrer">Download resume</a>
                <a className="button" href="https://github.com/pratik0316" target="_blank" rel="noreferrer">View GitHub</a>
                <a className="button" href="mailto:pratikdey0316@gmail.com">Contact</a>
              </div>
            </div>

            <aside className="hero-side" aria-label="Profile links">
              <div className="profile-card-top">
                <div className="avatar">PD</div>
                <div>
                  <div className="profile-name">Pratik Dey</div>
                  <div className="profile-role">Software Engineer, Microsoft</div>
                </div>
              </div>
              <div className="quick-links">
                {links.map((link) => (
                  <a className="quick-link" key={link.label} href={link.href} target={link.href.startsWith("http") ? "_blank" : undefined} rel="noreferrer">
                    <div>
                      <strong>{link.label}</strong>
                      <div>{link.value}</div>
                    </div>
                    <span>open</span>
                  </a>
                ))}
              </div>
            </aside>
          </div>

          <div className="metrics">
            {metrics.map((metric) => (
              <div className="metric" key={metric.label}>
                <div className="metric-value">{metric.value}</div>
                <div className="metric-label">{metric.label}</div>
              </div>
            ))}
          </div>
        </section>
      );
    }

    function Experience() {
      return (
        <section className="section shell" id="experience">
          <div className="section-heading">
            <h2>Experience</h2>
            <p>Production systems, customer-facing infrastructure, and high-signal engineering work.</p>
          </div>
          <div className="section-card experience-list">
            {experiences.map((experience) => (
              <article className="experience-item" key={experience.company}>
                <div>
                  <div className="company">{experience.company}</div>
                  <div className="role">{experience.role}</div>
                  <div className="date">{experience.date}</div>
                </div>
                <ul className="bullets">
                  {experience.bullets.map((bullet, index) => <li key={index}>{bullet}</li>)}
                </ul>
              </article>
            ))}
          </div>
        </section>
      );
    }

    function Skills() {
      return (
        <section className="section shell" id="skills">
          <div className="section-heading">
            <h2>Skills</h2>
            <p>Tools and systems I reach for in backend and infrastructure work.</p>
          </div>
          <div className="section-card">
            <div className="two-col">
              {skillGroups.map((group, index) => (
                <div className="mini-card" key={group.title}>
                  <p className="mini-title">{group.title}</p>
                  <div className="chips">
                    {group.skills.map((skill) => (
                      <span className={`chip ${index % 2 ? "alt" : ""}`} key={skill}>{skill}</span>
                    ))}
                  </div>
                </div>
              ))}
            </div>
          </div>
        </section>
      );
    }

    function EducationAndCerts() {
      return (
        <section className="section shell" id="education">
          <div className="section-heading">
            <h2>Education and Certifications</h2>
            <p>Academic base and recent AI tooling work.</p>
          </div>
          <div className="section-card two-col">
            <div className="mini-card">
              <p className="mini-title">Jadavpur University</p>
              <p className="mini-text">B.E., Computer Science and Engineering</p>
              <p className="mini-text">GPA 8.83 / 10.00</p>
              <p className="mini-text">Aug 2018 - Apr 2022</p>
            </div>
            <div className="mini-card">
              <p className="mini-title">Introduction to Model Context Protocol</p>
              <p className="mini-text">Anthropic certification covering MCP-based connections between AI systems, tools, and external data sources.</p>
            </div>
          </div>
        </section>
      );
    }

    function App() {
      return (
        <>
          <Nav />
          <main>
            <Hero />
            <Experience />
            <Skills />
            <EducationAndCerts />
          </main>
          <footer className="footer shell">
            Built for GitHub Pages as a static React profile. Resume PDF is available from the navigation.
          </footer>
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
