<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Pratik Dey - Software Engineer working on distributed systems, cloud storage, backend infrastructure, and production reliability." />
  <title>Pratik Dey - Software Engineer</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    :root {
      --blue: #1a73e8;
      --red: #ea4335;
      --yellow: #fbbc04;
      --green: #34a853;
      --text: #202124;
      --muted: #5f6368;
      --line: #e8eaed;
      --soft-blue: #e8f0fe;
      --soft-red: #fce8e6;
      --soft-green: #e6f4ea;
      --soft-yellow: #fef7e0;
      --page: #ffffff;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      background: var(--page);
      color: var(--text);
      font-family: Arial, "Helvetica Neue", Helvetica, sans-serif;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .wrap {
      width: min(1040px, calc(100% - 44px));
      margin: 0 auto;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 10;
      background: rgba(255, 255, 255, 0.94);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid transparent;
    }

    .topbar.scrolled {
      border-color: var(--line);
    }

    .topbar-inner {
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
    }

    .mini-logo {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      font-size: 15px;
      color: var(--muted);
      font-weight: 500;
    }

    .logo-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      display: inline-block;
    }

    .logo-dot:nth-child(1) { background: var(--blue); }
    .logo-dot:nth-child(2) { background: var(--red); }
    .logo-dot:nth-child(3) { background: var(--yellow); }
    .logo-dot:nth-child(4) { background: var(--green); }

    .dot-row {
      display: inline-flex;
      gap: 4px;
      align-items: center;
    }

    .nav {
      display: flex;
      align-items: center;
      gap: 4px;
      color: var(--muted);
      font-size: 14px;
    }

    .nav a {
      padding: 8px 12px;
      border-radius: 999px;
    }

    .nav a:hover {
      background: #f1f3f4;
      color: var(--text);
    }

    .nav .primary {
      background: var(--blue);
      color: #fff;
      font-weight: 500;
      margin-left: 8px;
    }

    .nav .primary:hover {
      background: #1765cc;
      color: #fff;
    }

    .hero {
      min-height: calc(100vh - 64px);
      display: grid;
      align-items: center;
      padding: 68px 0 52px;
      text-align: center;
    }

    .google-name {
      margin: 0;
      font-size: clamp(52px, 12vw, 122px);
      line-height: 0.92;
      letter-spacing: -0.075em;
      font-weight: 700;
    }

    .google-name span:nth-child(1) { color: var(--blue); }
    .google-name span:nth-child(2) { color: var(--red); }
    .google-name span:nth-child(3) { color: var(--yellow); }
    .google-name span:nth-child(4) { color: var(--blue); }
    .google-name span:nth-child(5) { color: var(--green); }
    .google-name span:nth-child(6) { color: var(--red); }
    .google-name span:nth-child(7) { color: var(--blue); }
    .google-name span:nth-child(8) { color: var(--green); }
    .google-name span:nth-child(9) { color: var(--red); }

    .subtitle {
      max-width: 760px;
      margin: 26px auto 0;
      font-size: clamp(18px, 2.3vw, 24px);
      color: #3c4043;
      line-height: 1.45;
    }

    .search-bar {
      width: min(720px, 100%);
      margin: 34px auto 0;
      min-height: 54px;
      border: 1px solid #dadce0;
      border-radius: 999px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 12px 22px;
      color: var(--muted);
      box-shadow: 0 1px 6px rgba(32, 33, 36, 0.08);
      background: #fff;
    }

    .search-icon {
      width: 18px;
      height: 18px;
      border: 2px solid #9aa0a6;
      border-radius: 50%;
      position: relative;
      flex: 0 0 auto;
    }

    .search-icon::after {
      content: "";
      width: 8px;
      height: 2px;
      background: #9aa0a6;
      position: absolute;
      right: -6px;
      bottom: -3px;
      transform: rotate(45deg);
      border-radius: 2px;
    }

    .search-text {
      color: #3c4043;
      font-size: 16px;
    }

    .hero-actions {
      margin-top: 26px;
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 12px;
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 40px;
      padding: 0 18px;
      border-radius: 4px;
      border: 1px solid #f8f9fa;
      background: #f8f9fa;
      color: #3c4043;
      font-size: 14px;
    }

    .button:hover {
      border-color: #dadce0;
      box-shadow: 0 1px 1px rgba(0, 0, 0, 0.08);
    }

    .button.blue {
      color: #fff;
      background: var(--blue);
      border-color: var(--blue);
    }

    .hero-links {
      margin-top: 24px;
      color: var(--muted);
      font-size: 14px;
    }

    .hero-links a {
      color: var(--blue);
      margin: 0 8px;
    }

    .section {
      padding: 42px 0;
      border-top: 1px solid var(--line);
    }

    .section-head {
      display: grid;
      grid-template-columns: 220px minmax(0, 1fr);
      gap: 36px;
      align-items: start;
      margin-bottom: 28px;
    }

    .section-kicker {
      margin: 0;
      color: var(--blue);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .section-title {
      margin: 0;
      font-size: clamp(28px, 5vw, 44px);
      letter-spacing: -0.045em;
      line-height: 1.08;
      color: var(--text);
    }

    .section-copy {
      margin: 12px 0 0;
      color: var(--muted);
      max-width: 680px;
      font-size: 16px;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 1px;
      background: var(--line);
      border-top: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
    }

    .stat {
      background: #fff;
      padding: 24px 18px;
    }

    .stat-value {
      font-size: 28px;
      line-height: 1;
      font-weight: 700;
      color: var(--blue);
      letter-spacing: -0.04em;
    }

    .stat:nth-child(2) .stat-value { color: var(--red); }
    .stat:nth-child(3) .stat-value { color: var(--green); }
    .stat:nth-child(4) .stat-value { color: #b06000; }

    .stat-label {
      margin-top: 8px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.35;
    }

    .experience-row {
      display: grid;
      grid-template-columns: 220px minmax(0, 1fr);
      gap: 36px;
      padding: 30px 0;
      border-top: 1px solid var(--line);
    }

    .experience-row:first-child {
      border-top: 0;
      padding-top: 0;
    }

    .company {
      margin: 0;
      font-size: 20px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.02em;
    }

    .role {
      margin: 4px 0 0;
      color: var(--blue);
      font-weight: 600;
      font-size: 14px;
    }

    .date {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 14px;
    }

    .bullets {
      margin: 0;
      padding-left: 18px;
      color: #3c4043;
    }

    .bullets li {
      margin-bottom: 9px;
      padding-left: 4px;
    }

    .bullets li:last-child {
      margin-bottom: 0;
    }

    .bullets strong {
      color: var(--text);
      font-weight: 700;
    }

    .skill-grid {
      display: grid;
      grid-template-columns: 220px minmax(0, 1fr);
      gap: 36px;
    }

    .skill-row {
      display: grid;
      grid-template-columns: 170px minmax(0, 1fr);
      gap: 20px;
      padding: 18px 0;
      border-top: 1px solid var(--line);
    }

    .skill-row:first-child {
      border-top: 0;
      padding-top: 0;
    }

    .skill-label {
      font-weight: 700;
      color: var(--text);
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .chip {
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 600;
      color: var(--blue);
      background: var(--soft-blue);
    }

    .chip.red {
      color: var(--red);
      background: var(--soft-red);
    }

    .chip.green {
      color: var(--green);
      background: var(--soft-green);
    }

    .chip.yellow {
      color: #8a5a00;
      background: var(--soft-yellow);
    }

    .education-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 44px;
    }

    .plain-block {
      border-top: 1px solid var(--line);
      padding-top: 18px;
    }

    .plain-block h3 {
      margin: 0;
      font-size: 18px;
      letter-spacing: -0.02em;
    }

    .plain-block p {
      margin: 6px 0 0;
      color: var(--muted);
    }

    footer {
      padding: 44px 0 54px;
      border-top: 1px solid var(--line);
      color: var(--muted);
      font-size: 14px;
      text-align: center;
    }

    @media (max-width: 820px) {
      .nav a:not(.primary) {
        display: none;
      }

      .section-head,
      .experience-row,
      .skill-grid,
      .skill-row {
        grid-template-columns: 1fr;
        gap: 14px;
      }

      .stats,
      .education-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 560px) {
      .wrap {
        width: min(100% - 28px, 1040px);
      }

      .topbar-inner {
        height: 58px;
      }

      .hero {
        min-height: auto;
        padding: 62px 0 42px;
      }

      .search-bar {
        align-items: flex-start;
        border-radius: 24px;
        text-align: left;
      }

      .stats,
      .education-grid {
        grid-template-columns: 1fr;
      }

      .stat {
        padding: 20px 0;
      }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const resumeHref = "./Pratik_Dey_Resume.pdf";

    const contactLinks = [
      { label: "GitHub", href: "https://github.com/pratik0316" },
      { label: "LinkedIn", href: "https://linkedin.com/in/pratikdey0316" },
      { label: "LeetCode", href: "https://leetcode.com/u/pratikdey0316" },
      { label: "Email", href: "mailto:pratikdey0316@gmail.com" },
    ];

    const stats = [
      { value: "4+ yrs", label: "experience across Microsoft, Amazon, CRED, and open source" },
      { value: "1000/min", label: "Azure Direct Drive DNS operation throughput" },
      { value: "6K/min", label: "DynamoDB CDC writes indexed into OpenSearch" },
      { value: "0", label: "RBAC conflicts after removing subscription-level contention" },
    ];

    const experiences = [
      {
        company: "Microsoft",
        role: "Software Engineer - Azure Storage (Storage Resource Provider)",
        date: "Sept 2024 - Present",
        bullets: [
          <>Scaled <strong>Azure Direct Drive</strong> provisioning throughput from <strong>300/min to 1000/min</strong> through DNS architecture redesign.</>,
          <>Eliminated subscription-level contention in <strong>RBAC</strong> notification handling, reducing <strong>HTTP 409</strong> conflicts from <strong>150/hr to zero</strong>.</>,
          <>Mitigated a critical security issue exposing <strong>Azure Storage SAS keys</strong> in logs through detection and service hardening.</>,
          <>Migrated <strong>4+ services</strong> from IFX to <strong>OpenTelemetry</strong>, improving telemetry scalability and reducing metric cardinality.</>,
          <>Built a <strong>GitHub Copilot skill</strong> to improve safety certification review documentation for externally exposed service APIs.</>,
        ],
      },
      {
        company: "Amazon",
        role: "Software Engineer",
        date: "July 2022 - Aug 2024",
        bullets: [
          <>Architected and scaled a real-time CDC pipeline (<strong>DynamoDB - Kinesis - Lambda - OpenSearch</strong>) supporting <strong>6K writes/min</strong>.</>,
          <>Eliminated <strong>60K+/hour</strong> false-positive Alexa voice command triggers through command-processing redesign.</>,
          <>Externalized <strong>Personal Knowledge Service</strong> to Alexa mobile clients, reworking AuthN/AuthZ and scaling backend capacity for launch readiness.</>,
        ],
      },
      {
        company: "CRED",
        role: "SWE Intern - SRE",
        date: "Oct 2021 - Mar 2022",
        bullets: [
          <>Built internal <strong>IAM</strong> access tooling for self-serve AWS role grants, reducing SRE on-call effort by <strong>50%</strong>.</>,
          <>Automated cross-account IAM user migrations with policy mapping, permission boundaries, and rollback flows.</>,
        ],
      },
      {
        company: "Google Summer of Code - AboutCode",
        role: "Open Source Contributor",
        date: "May 2021 - Aug 2021",
        bullets: [
          <>Enhanced DeltaCode diff engine using VirtualCodebase and improved API consistency through Azure CI quality checks.</>,
          <>Improved project onboarding with ReadTheDocs documentation and Docker containerization.</>,
        ],
      },
    ];

    const skills = [
      { label: "Languages", tone: "blue", values: ["Python", "Kotlin", "Go", "C#", "Rust"] },
      { label: "Cloud", tone: "red", values: ["Azure", "AWS", "Kubernetes", "Docker", "ECS", "Lambda"] },
      { label: "Data", tone: "green", values: ["DynamoDB", "OpenSearch", "Kinesis", "Apache Spark", "Apache Arrow"] },
      { label: "Reliability", tone: "yellow", values: ["OpenTelemetry", "CI/CD", "Production Debugging", "Incident Response"] },
    ];

    function App() {
      return (
        <>
          <Header />
          <main>
            <Hero />
            <section className="section">
              <div className="wrap stats">
                {stats.map((item) => (
                  <div className="stat" key={item.label}>
                    <div className="stat-value">{item.value}</div>
                    <div className="stat-label">{item.label}</div>
                  </div>
                ))}
              </div>
            </section>
            <Experience />
            <Skills />
            <Education />
          </main>
          <footer className="wrap">
            pratik0316.github.io - Built as a static GitHub Pages profile.
          </footer>
        </>
      );
    }

    function Header() {
      const [scrolled, setScrolled] = React.useState(false);

      React.useEffect(() => {
        const onScroll = () => setScrolled(window.scrollY > 8);
        onScroll();
        window.addEventListener("scroll", onScroll);
        return () => window.removeEventListener("scroll", onScroll);
      }, []);

      return (
        <header className={`topbar ${scrolled ? "scrolled" : ""}`}>
          <div className="wrap topbar-inner">
            <a className="mini-logo" href="#top">
              <span className="dot-row" aria-hidden="true">
                <span className="logo-dot"></span>
                <span className="logo-dot"></span>
                <span className="logo-dot"></span>
                <span className="logo-dot"></span>
              </span>
              Pratik Dey
            </a>
            <nav className="nav" aria-label="Primary navigation">
              <a href="#experience">Experience</a>
              <a href="#skills">Skills</a>
              <a href="#education">Education</a>
              <a className="primary" href={resumeHref} target="_blank" rel="noreferrer">Resume</a>
            </nav>
          </div>
        </header>
      );
    }

    function Hero() {
      return (
        <section className="hero wrap" id="top">
          <div>
            <h1 className="google-name" aria-label="Pratik Dey">
              {"PratikDey".split("").map((letter, index) => (
                <span key={`${letter}-${index}`}>{letter}</span>
              ))}
            </h1>
            <p className="subtitle">
              Software Engineer building reliable cloud storage control plane systems,
              backend infrastructure, and production systems at scale.
            </p>
            <div className="search-bar" aria-label="Profile summary">
              <span className="search-icon" aria-hidden="true"></span>
              <span className="search-text">Distributed systems · Azure Storage · Data infrastructure · Production reliability</span>
            </div>
            <div className="hero-actions">
              <a className="button blue" href={resumeHref} target="_blank" rel="noreferrer">Download resume</a>
              <a className="button" href="#experience">View experience</a>
            </div>
            <div className="hero-links">
              {contactLinks.map((link) => (
                <a key={link.label} href={link.href} target={link.href.startsWith("http") ? "_blank" : undefined} rel="noreferrer">
                  {link.label}
                </a>
              ))}
            </div>
          </div>
        </section>
      );
    }

    function SectionIntro({ kicker, title, copy }) {
      return (
        <div className="section-head">
          <p className="section-kicker">{kicker}</p>
          <div>
            <h2 className="section-title">{title}</h2>
            {copy ? <p className="section-copy">{copy}</p> : null}
          </div>
        </div>
      );
    }

    function Experience() {
      return (
        <section className="section" id="experience">
          <div className="wrap">
            <SectionIntro
              kicker="Experience"
              title="Work across cloud infrastructure, backend systems, and production reliability."
              copy="Selected work that emphasizes scale, reliability, security, and pragmatic engineering impact."
            />
            <div>
              {experiences.map((item) => (
                <article className="experience-row" key={item.company}>
                  <div>
                    <h3 className="company">{item.company}</h3>
                    <p className="role">{item.role}</p>
                    <p className="date">{item.date}</p>
                  </div>
                  <ul className="bullets">
                    {item.bullets.map((bullet, index) => (
                      <li key={index}>{bullet}</li>
                    ))}
                  </ul>
                </article>
              ))}
            </div>
          </div>
        </section>
      );
    }

    function Skills() {
      return (
        <section className="section" id="skills">
          <div className="wrap">
            <div className="skill-grid">
              <div>
                <p className="section-kicker">Skills</p>
                <h2 className="section-title">Tools I use to build and operate systems.</h2>
              </div>
              <div>
                {skills.map((group) => (
                  <div className="skill-row" key={group.label}>
                    <div className="skill-label">{group.label}</div>
                    <div className="chips">
                      {group.values.map((value) => (
                        <span className={`chip ${group.tone}`} key={value}>{value}</span>
                      ))}
                    </div>
                  </div>
                ))}
              </div>
            </div>
          </div>
        </section>
      );
    }

    function Education() {
      return (
        <section className="section" id="education">
          <div className="wrap">
            <SectionIntro
              kicker="Education"
              title="Academic base and recent AI tooling."
              copy="A compact note on formal education and recent certification work."
            />
            <div className="education-grid">
              <div className="plain-block">
                <h3>Jadavpur University</h3>
                <p>B.E., Computer Science and Engineering</p>
                <p>GPA 8.83 / 10.00 · Aug 2018 - Apr 2022</p>
              </div>
              <div className="plain-block">
                <h3>Introduction to Model Context Protocol</h3>
                <p>Anthropic certification on connecting AI models to tools, services, and external data sources through MCP.</p>
              </div>
            </div>
          </div>
        </section>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
