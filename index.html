<html lang="en">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    :root {
      --blue: #1a73e8;
      --red: #ea4335;
      --yellow: #fbbc04;
      --green: #34a853;
      --text: #202124;
      --muted: #5f6368;
      --line: #e8eaed;
      --soft-blue: #e8f0fe;
      --soft-red: #fce8e6;
      --soft-green: #e6f4ea;
      --soft-yellow: #fef7e0;
      --page: #ffffff;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      background: var(--page);
      color: var(--text);
      font-family: Arial, "Helvetica Neue", Helvetica, sans-serif;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    main,
    footer {
      position: relative;
      z-index: 1;
    }

    .sparkle-field {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .sparkle {
      position: absolute;
      left: var(--x);
      top: var(--y);
      width: var(--size);
      height: var(--size);
      border-radius: 50%;
      background: var(--color);
      opacity: 0.18;
      box-shadow: 0 0 18px var(--glow);
      animation:
        sparkle-drift var(--duration) ease-in-out infinite alternate,
        sparkle-twinkle calc(var(--duration) * 0.62) ease-in-out infinite;
      animation-delay: var(--delay);
    }

    .sparkle::after {
      content: "";
      position: absolute;
      inset: -4px;
      border-radius: 50%;
      border: 1px solid var(--glow);
      opacity: 0.18;
    }

    @keyframes sparkle-drift {
      from {
        transform: translate3d(0, 0, 0) scale(1);
      }
      to {
        transform: translate3d(var(--dx), var(--dy), 0) scale(1.15);
      }
    }

    @keyframes sparkle-twinkle {
      0%, 100% {
        opacity: 0.10;
      }
      50% {
        opacity: 0.32;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .sparkle {
        animation: none;
      }
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .wrap {
      width: min(1040px, calc(100% - 44px));
      margin: 0 auto;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 10;
      background: rgba(255, 255, 255, 0.94);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid transparent;
    }

    .topbar.scrolled {
      border-color: var(--line);
    }

    .topbar-inner {
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
    }

    .mini-logo {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      font-size: 15px;
      color: var(--muted);
      font-weight: 500;
    }

    .logo-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      display: inline-block;
    }

    .logo-dot:nth-child(1) { background: var(--blue); }
    .logo-dot:nth-child(2) { background: var(--red); }
    .logo-dot:nth-child(3) { background: var(--yellow); }
    .logo-dot:nth-child(4) { background: var(--green); }

    .dot-row {
      display: inline-flex;
      gap: 4px;
      align-items: center;
    }

    .nav {
      display: flex;
      align-items: center;
      gap: 4px;
      color: var(--muted);
      font-size: 14px;
    }

    .nav a {
      padding: 8px 12px;
      border-radius: 999px;
    }

    .nav a:hover {
      background: #f1f3f4;
      color: var(--text);
    }

    .nav .primary {
      background: var(--blue);
      color: #fff;
      font-weight: 500;
      margin-left: 8px;
    }

    .nav .primary:hover {
      background: #1765cc;
      color: #fff;
    }

    .hero {
      min-height: calc(92vh - 64px);
      display: grid;
      align-items: center;
      padding: 72px 0 52px;
    }

    .hero-layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 360px;
      gap: 64px;
      align-items: center;
    }

    .intro-label {
      margin: 0 0 14px;
      color: var(--blue);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .hero-name {
      margin: 0;
      font-size: clamp(44px, 7vw, 78px);
      line-height: 1;
      letter-spacing: -0.06em;
      font-weight: 700;
      color: var(--text);
    }

    .hero-name span {
      color: var(--blue);
    }

    .subtitle {
      max-width: 650px;
      margin: 22px 0 0;
      font-size: clamp(18px, 2.3vw, 24px);
      color: #3c4043;
      line-height: 1.45;
    }

    .search-area {
      width: min(680px, 100%);
      margin: 34px 0 0;
      position: relative;
    }

    .search-bar {
      width: 100%;
      min-height: 54px;
      border: 1px solid #dadce0;
      border-radius: 999px;
      display: flex;
      align-items: center;
      justify-content: flex-start;
      gap: 12px;
      padding: 12px 22px;
      color: var(--muted);
      box-shadow: 0 1px 6px rgba(32, 33, 36, 0.08);
      background: #fff;
    }

    .search-bar:focus-within {
      border-color: transparent;
      box-shadow: 0 1px 6px rgba(32, 33, 36, 0.16);
    }

    .search-icon {
      width: 18px;
      height: 18px;
      border: 2px solid #9aa0a6;
      border-radius: 50%;
      position: relative;
      flex: 0 0 auto;
    }

    .search-icon::after {
      content: "";
      width: 8px;
      height: 2px;
      background: #9aa0a6;
      position: absolute;
      right: -6px;
      bottom: -3px;
      transform: rotate(45deg);
      border-radius: 2px;
    }

    .search-input {
      width: 100%;
      border: 0;
      outline: 0;
      background: transparent;
      color: #3c4043;
      font-size: 16px;
      font-family: inherit;
      line-height: 1.5;
    }

    .search-input::placeholder {
      color: #3c4043;
      opacity: 1;
    }

    .search-results {
      position: absolute;
      top: calc(100% + 8px);
      left: 0;
      right: 0;
      z-index: 3;
      background: #fff;
      border: 1px solid #dadce0;
      border-radius: 18px;
      box-shadow: 0 8px 24px rgba(32, 33, 36, 0.14);
      padding: 8px;
      overflow: hidden;
    }

    .search-result {
      width: 100%;
      display: grid;
      grid-template-columns: 22px minmax(0, 1fr);
      gap: 10px;
      align-items: start;
      border: 0;
      background: transparent;
      text-align: left;
      padding: 10px 12px;
      border-radius: 12px;
      color: var(--text);
      font-family: inherit;
      cursor: pointer;
    }

    .search-result:hover,
    .search-result:focus {
      outline: 0;
      background: #f8f9fa;
    }

    .result-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--blue);
      margin-top: 9px;
    }

    .search-result:nth-child(2) .result-dot { background: var(--red); }
    .search-result:nth-child(3) .result-dot { background: var(--green); }
    .search-result:nth-child(4) .result-dot { background: var(--yellow); }

    .result-title {
      font-size: 14px;
      font-weight: 700;
      color: var(--text);
    }

    .result-meta {
      margin-top: 2px;
      font-size: 13px;
      color: var(--muted);
      line-height: 1.35;
    }

    .search-empty {
      padding: 14px 16px;
      color: var(--muted);
      font-size: 14px;
    }

    .hero-actions {

      display: flex;
      flex-wrap: wrap;
      gap: 12px;

    .button {

      justify-content: center;

      padding: 0 18px;

      border: 1px solid #f8f9fa;
      background: #f8f9fa;
      color: #3c4043;
      font-size: 14px;

    .hero-links {

      color: var(--muted);
      font-size: 14px;

      border-radius: 28px;
      border: 1px solid var(--line);

    .photo-caption {
      margin: 12px 0 0;

      font-size: 13px;
      text-align: center;
    }

    .section {
      padding: 42px 0;
      border-top: 1px solid var(--line);

    .section-head {

    .section-kicker {

    .section-copy {
      margin: 12px 0 0;

    }

    .experience-row {
      display: grid;
      grid-template-columns: 220px minmax(0, 1fr);
      gap: 36px;
      padding: 30px 0;
      border-top: 1px solid var(--line);

    .experience-row:first-child {
      border-top: 0;
      padding-top: 0;
    }

    .company {
      margin: 0;
      font-size: 20px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.02em;
    }

    .role {
      margin: 4px 0 0;
      color: var(--blue);
      font-weight: 600;
      font-size: 14px;
    }

    .date {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 14px;
    }

    .bullets {
      margin: 0;

      color: #3c4043;
    }

    .bullets li {
      margin-bottom: 9px;
      padding-left: 4px;
    }

    .bullets li:last-child {
      margin-bottom: 0;
    }

    .bullets strong {
      color: var(--text);
      font-weight: 700;
    }

    .skill-grid {
      display: grid;
      grid-template-columns: 220px minmax(0, 1fr);
      gap: 36px;
    }

    .skill-row {
      display: grid;
      grid-template-columns: 170px minmax(0, 1fr);
      gap: 20px;
      padding: 18px 0;
      border-top: 1px solid var(--line);
    }

    .skill-row:first-child {
      border-top: 0;
      padding-top: 0;
    }

    .skill-label {
      font-weight: 700;
      color: var(--text);
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .chip {
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 600;
      color: var(--blue);
      background: var(--soft-blue);
    }

    .chip.red {
      color: var(--red);
      background: var(--soft-red);
    }

    .chip.green {
      color: var(--green);
      background: var(--soft-green);
    }

    .chip.yellow {
      color: #8a5a00;
      background: var(--soft-yellow);
    }

    .education-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 44px;
    }

    .plain-block {
      border-top: 1px solid var(--line);
      padding-top: 18px;
    }

    .plain-block h3 {
      margin: 0;
      font-size: 18px;
      letter-spacing: -0.02em;
    }

    .plain-block p {
      margin: 6px 0 0;
      color: var(--muted);
    }

    footer {
      padding: 44px 0 54px;
      border-top: 1px solid var(--line);
      color: var(--muted);
      font-size: 14px;
      text-align: center;
    }

    @media (max-width: 820px) {
      .nav a:not(.primary) {
        display: none;
      }

      .section-head,
      .experience-row,
      .skill-grid,
      .skill-row {
        grid-template-columns: 1fr;
        gap: 14px;
      }

      .hero-layout,
      .education-grid {
        grid-template-columns: 1fr;
      }

      .photo-wrap {
        justify-self: start;
        width: min(320px, 100%);
      }
    }

    @media (max-width: 560px) {
      .wrap {
        width: min(100% - 28px, 1040px);
      }

      .topbar-inner {
        height: 58px;
      }

      .hero {
        min-height: auto;
        padding: 62px 0 42px;
      }

      .search-bar {
        align-items: flex-start;
        border-radius: 24px;
        text-align: left;
      }

      .education-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

              <a href="#education">Education</a>
              <a className="primary" href={resumeHref} target="_blank" rel="noreferrer">Resume</a>
            </nav>
          </div>
        </header>
      );
    }

    function Hero() {
      const [query, setQuery] = React.useState("");
      const normalizedQuery = query.trim().toLowerCase();
      const results = normalizedQuery
        ? searchIndex
            .filter((item) => `${item.title} ${item.meta} ${item.text}`.toLowerCase().includes(normalizedQuery))
            .slice(0, 5)
        : [];

      const goToResult = (item) => {
        if (item.target === "resume") {
          window.open(resumeHref, "_blank", "noopener,noreferrer");
          return;
        }

        document.getElementById(item.target)?.scrollIntoView({ behavior: "smooth", block: "start" });
        setQuery("");
      };

      const handleSubmit = (event) => {
        event.preventDefault();
        if (results[0]) {
          goToResult(results[0]);
        }
      };

      return (
        <section className="hero wrap" id="top">
          <div className="hero-layout">
            <div>
              <p className="intro-label">Software Engineer</p>
              <h1 className="hero-name">Pratik <span>Dey</span></h1>
              <p className="subtitle">
                I build reliable cloud storage control plane systems, backend infrastructure,
                and production systems at scale.
              </p>
              <form className="search-area" onSubmit={handleSubmit} role="search">
                <div className="search-bar">
                  <span className="search-icon" aria-hidden="true"></span>
                  <input
                    className="search-input"
                    type="search"
                    value={query}
                    onChange={(event) => setQuery(event.target.value)}
                    placeholder="Search experience, skills, Azure, DynamoDB, OpenTelemetry..."
                    aria-label="Search profile content"
                  />
                </div>
                {normalizedQuery ? (
                  <div className="search-results" aria-label="Search results">
                    {results.length ? (
                      results.map((item) => (
                        <button className="search-result" type="button" key={item.title} onClick={() => goToResult(item)}>
                          <span className="result-dot" aria-hidden="true"></span>
                          <span>
                            <span className="result-title">{item.title}</span>
                            <span className="result-meta">{item.meta}</span>
                          </span>
                        </button>
                      ))
                    ) : (
                      <div className="search-empty">No matches yet. Try Azure, DynamoDB, skills, IAM, or resume.</div>
                    )}
                  </div>
                ) : null}
              </form>
              <div className="hero-actions">
                <a className="button blue" href={resumeHref} target="_blank" rel="noreferrer">Download resume</a>
                <a className="button" href="#experience">View experience</a>
              </div>
              <div className="hero-links">
                {contactLinks.map((link) => (
                  <a key={link.label} href={link.href} target={link.href.startsWith("http") ? "_blank" : undefined} rel="noreferrer">
                    {link.label}
                  </a>
                ))}
              </div>
            </div>
            <div className="photo-wrap">
              <img className="profile-photo" src="./Pratik-Megalaya.jpg" alt="Pratik Dey standing near the living root bridge in Meghalaya" />
              <p className="photo-caption">Meghalaya, India</p>
            </div>
          </div>
        </section>
      );
    }

    function SectionIntro({ kicker, title, copy }) {
      return (
        <div className="section-head">
          <p className="section-kicker">{kicker}</p>
          <div>
            <h2 className="section-title">{title}</h2>
            {copy ? <p className="section-copy">{copy}</p> : null}
          </div>
        </div>
      );
    }

    function Experience() {
      return (
        <section className="section" id="experience">
          <div className="wrap">
            <SectionIntro
              kicker="Experience"
              title="Work across cloud infrastructure, backend systems, and production reliability."
              copy="Selected work that emphasizes scale, reliability, security, and pragmatic engineering impact."
            />
            <div>
              {experiences.map((item) => (
                <article className="experience-row" key={item.company}>
                  <div>
                    <h3 className="company">{item.company}</h3>
                    <p className="role">{item.role}</p>
                    <p className="date">{item.date}</p>
                  </div>
                  <ul className="bullets">
                    {item.bullets.map((bullet, index) => (
                      <li key={index}>{bullet}</li>
                    ))}
                  </ul>
                </article>
              ))}
            </div>
          </div>
        </section>
      );
    }

    function Skills() {
      return (
        <section className="section" id="skills">
          <div className="wrap">
            <div className="skill-grid">
              <div>
                <p className="section-kicker">Skills</p>
                <h2 className="section-title">Tools I use to build and operate systems.</h2>
              </div>
              <div>
                {skills.map((group) => (
                  <div className="skill-row" key={group.label}>
                    <div className="skill-label">{group.label}</div>
                    <div className="chips">
                      {group.values.map((value) => (
                        <span className={`chip ${group.tone}`} key={value}>{value}</span>
                      ))}
                    </div>
                  </div>
                ))}
              </div>
            </div>
          </div>
        </section>
      );
    }

    function Education() {
      return (
        <section className="section" id="education">
          <div className="wrap">
            <SectionIntro
              kicker="Education"
              title="Academic base and recent AI tooling."
              copy="A compact note on formal education and recent certification work."
            />
            <div className="education-grid">
              <div className="plain-block">
                <h3>Jadavpur University</h3>
                <p>B.E., Computer Science and Engineering</p>
                <p>GPA 8.83 / 10.00 · Aug 2018 - Apr 2022</p>
              </div>
              <div className="plain-block">
                <h3>Introduction to Model Context Protocol</h3>
                <p>Anthropic certification on connecting AI models to tools, services, and external data sources through MCP.</p>
              </div>
            </div>
          </div>
        </section>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
